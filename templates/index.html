<!DOCTYPE html>
<html>
<head>
<title>AI Resume Screening</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:420px;
text-align:center;
box-shadow:0px 10px 25px rgba(0,0,0,0.2);
}

h1{
margin-bottom:20px;
color:#333;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px;
width:100%;
border:none;
border-radius:6px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5563d6;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Resume Screening</h1>

<form method="POST" enctype="multipart/form-data">

<label>Upload Resume</label>
<input type="file" name="resume" required>

<label>Job Description</label>
<textarea name="jobdesc" rows="5"></textarea>

<button type="submit">Analyze Resume</button>

</form>

</div>

</body>
</html>
